title: Sprygen
description: Enterprise-ready Spring Boot project generator CLI
url: "https://wadecalvin9.github.io"
baseurl: "/Sprygen"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: dark

# Aux links (top-right corner)
aux_links:
  "Sprygen on GitHub":
    - "https://github.com/wadecalvin9/Sprygen"

aux_links_new_tab: true

# Navigation structure
nav_sort: order

# Search
search_enabled: true
search.heading_level: 3

# Footer
footer_content: "Sprygen &copy; 2026. Distributed under the <a href=\"https://github.com/wadecalvin9/Sprygen/blob/main/LICENSE\">MIT License</a>."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Heading anchors
heading_anchors: true

# Code copy
enable_copy_code_button: true

# Callouts
callouts:
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: red

plugins:
  - jekyll-remote-theme
